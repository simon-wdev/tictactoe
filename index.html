<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>

    <link rel="stylesheet" href="./Style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="text winTextTop">TIC-TAC-TOE</div>
        <div class="game"></div>
        <div class="text winTextBottom">ENTER PLAYER NAMES</div>
        <div class="buttonWrapper">
           <div class="form">
                <label class="player1" for="p1">Player X:</label><br>
                <input type="text" id="player" name="p1"><br>
            </div>
            <button class="startBtn button">ENTER NAMES</button>
            <button class="resetBtn button">RESET</button>
            <div class="form">
                <label class="player2" for="p2">Player O:</label><br>
                <input type="text" id="player" name="p2"><br>
            </div>
        </div>
    </div>
    <footer>
        <img src="./Ressources/github-svgrepo-com.svg" width="32" alt="github logo">
        <a href="https://github.com/simon-wdev">simon-wdev</a>
    </footer>

<script src="./Skript/script.js"></script>
</body>
</html>
